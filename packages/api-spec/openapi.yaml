openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: murivest
    description: Murivest OS operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /murivest/command-center:
    get:
      operationId: getCommandCenter
      tags: [murivest]
      summary: Executive command center
      responses:
        "200":
          description: Command center summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandCenter"
  /murivest/operating-model:
    get:
      operationId: getOperatingModel
      tags: [murivest]
      summary: Departments, modules, access and workflows
      responses:
        "200":
          description: Operating model
          content:
            application/json:
              schema:
                type: object
                properties:
                  departments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Department"
                  modules:
                    type: array
                    items:
                      $ref: "#/components/schemas/Module"
                  accessMatrix:
                    type: array
                    items:
                      $ref: "#/components/schemas/AccessRule"
                  workflowMap:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkflowLink"
                required: [departments, modules, accessMatrix, workflowMap]
  /murivest/contacts:
    get:
      operationId: listContacts
      tags: [murivest]
      summary: List Murivest contacts
      responses:
        "200":
          description: Contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [murivest]
      summary: Create contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Created contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
  /murivest/contacts/{id}:
    patch:
      operationId: updateContact
      tags: [murivest]
      summary: Update contact
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
  /murivest/properties:
    get:
      operationId: listProperties
      tags: [murivest]
      summary: List properties and mandates
      responses:
        "200":
          description: Properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Property"
    post:
      operationId: createProperty
      tags: [murivest]
      summary: Create property
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyInput"
      responses:
        "201":
          description: Created property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
  /murivest/properties/{id}:
    patch:
      operationId: updateProperty
      tags: [murivest]
      summary: Update property
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyInput"
      responses:
        "200":
          description: Updated property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
  /murivest/deals:
    get:
      operationId: listDeals
      tags: [murivest]
      summary: List opportunities and mandates in pipeline
      responses:
        "200":
          description: Deals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deal"
    post:
      operationId: createDeal
      tags: [murivest]
      summary: Create deal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealInput"
      responses:
        "201":
          description: Created deal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"
  /murivest/deals/{id}:
    patch:
      operationId: updateDeal
      tags: [murivest]
      summary: Update deal
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealInput"
      responses:
        "200":
          description: Updated deal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"
  /murivest/tasks:
    get:
      operationId: listTasks
      tags: [murivest]
      summary: List operational tasks
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [murivest]
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /murivest/tasks/{id}:
    patch:
      operationId: updateTask
      tags: [murivest]
      summary: Update task
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /murivest/documents:
    get:
      operationId: listDocuments
      tags: [murivest]
      summary: List document vault records
      responses:
        "200":
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [murivest]
      summary: Create document record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
  /murivest/legal:
    get:
      operationId: listLegalMatters
      tags: [murivest]
      summary: List legal and compliance matters
      responses:
        "200":
          description: Legal matters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LegalMatter"
    post:
      operationId: createLegalMatter
      tags: [murivest]
      summary: Create legal matter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LegalMatterInput"
      responses:
        "201":
          description: Created legal matter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalMatter"
  /murivest/legal/{id}:
    patch:
      operationId: updateLegalMatter
      tags: [murivest]
      summary: Update legal matter
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LegalMatterInput"
      responses:
        "200":
          description: Updated legal matter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalMatter"
  /murivest/finance:
    get:
      operationId: listFinanceRecords
      tags: [murivest]
      summary: List finance ledger records
      responses:
        "200":
          description: Finance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FinanceRecord"
  /murivest/integrations:
    get:
      operationId: listIntegrations
      tags: [murivest]
      summary: Integration readiness and status
      responses:
        "200":
          description: Integrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrationStatus"
  /murivest/activity:
    get:
      operationId: listActivity
      tags: [murivest]
      summary: Recent operating activity
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"
components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    Metric:
      type: object
      properties:
        label:
          type: string
        value:
          type: string
        trend:
          type: string
        tone:
          type: string
          enum: [positive, neutral, warning, critical]
      required: [label, value, trend, tone]
    CommandCenter:
      type: object
      properties:
        date:
          type: string
        executiveBrief:
          type: string
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/Metric"
        pipelineByStage:
          type: array
          items:
            $ref: "#/components/schemas/StageValue"
        operatingRisks:
          type: array
          items:
            type: string
        hbrRecommendations:
          type: array
          items:
            type: string
      required: [date, executiveBrief, metrics, pipelineByStage, operatingRisks, hbrRecommendations]
    StageValue:
      type: object
      properties:
        stage:
          type: string
        value:
          type: number
        count:
          type: integer
      required: [stage, value, count]
    Department:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        purpose:
          type: string
        kpis:
          type: array
          items:
            type: string
        interactsWith:
          type: array
          items:
            type: string
      required: [id, name, purpose, kpis, interactsWith]
    Module:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        scope:
          type: string
        owners:
          type: array
          items:
            type: string
      required: [id, name, scope, owners]
    AccessRule:
      type: object
      properties:
        role:
          type: string
        access:
          type: string
        restrictions:
          type: string
      required: [role, access, restrictions]
    WorkflowLink:
      type: object
      properties:
        from:
          type: string
        to:
          type: string
        handoff:
          type: string
      required: [from, to, handoff]
    Contact:
      allOf:
        - $ref: "#/components/schemas/ContactInput"
        - type: object
          properties:
            id:
              type: string
            lastInteraction:
              type: string
          required: [id, lastInteraction]
    ContactInput:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
          enum: [investor, landlord, tenant, prospect, vendor, partner, staff]
        company:
          type: string
        email:
          type: string
        phone:
          type: string
        relationshipOwner:
          type: string
        status:
          type: string
          enum: [active, nurturing, onboarding, restricted, inactive]
        capitalPreference:
          type: string
        accessTier:
          type: string
          enum: [admin, internal, investor_portal, landlord_portal, tenant_portal]
      required: [name, category, email, relationshipOwner, status, accessTier]
    Property:
      allOf:
        - $ref: "#/components/schemas/PropertyInput"
        - type: object
          properties:
            id:
              type: string
            mandateHealth:
              type: string
          required: [id, mandateHealth]
    PropertyInput:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        assetClass:
          type: string
        askingPrice:
          type: number
        yield:
          type: number
        status:
          type: string
          enum: [off_market, mandate_pending, active, under_offer, sold, archived]
        mandateType:
          type: string
          enum: [exclusive, open, ats_pending, internal_only]
        owner:
          type: string
        publishToWebsite:
          type: boolean
      required: [name, location, assetClass, askingPrice, yield, status, mandateType, owner, publishToWebsite]
    Deal:
      allOf:
        - $ref: "#/components/schemas/DealInput"
        - type: object
          properties:
            id:
              type: string
            probability:
              type: integer
          required: [id, probability]
    DealInput:
      type: object
      properties:
        title:
          type: string
        propertyName:
          type: string
        investorName:
          type: string
        stage:
          type: string
          enum: [lead, qualified, site_visit, loi, due_diligence, closing, won, lost]
        value:
          type: number
        owner:
          type: string
        nextStep:
          type: string
        closeDate:
          type: string
      required: [title, propertyName, investorName, stage, value, owner, nextStep, closeDate]
    Task:
      allOf:
        - $ref: "#/components/schemas/TaskInput"
        - type: object
          properties:
            id:
              type: string
          required: [id]
    TaskInput:
      type: object
      properties:
        title:
          type: string
        department:
          type: string
        priority:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [submitted, in_progress, awaiting_approval, resolved, closed]
        owner:
          type: string
        dueDate:
          type: string
      required: [title, department, priority, status, owner, dueDate]
    Document:
      allOf:
        - $ref: "#/components/schemas/DocumentInput"
        - type: object
          properties:
            id:
              type: string
          required: [id]
    DocumentInput:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
        linkedRecord:
          type: string
        confidentiality:
          type: string
          enum: [public, internal, restricted, board_only]
        approvalStatus:
          type: string
          enum: [draft, review, approved, expired]
      required: [title, type, linkedRecord, confidentiality, approvalStatus]
    LegalMatter:
      allOf:
        - $ref: "#/components/schemas/LegalMatterInput"
        - type: object
          properties:
            id:
              type: string
          required: [id]
    LegalMatterInput:
      type: object
      properties:
        title:
          type: string
        matterType:
          type: string
        linkedRecord:
          type: string
        owner:
          type: string
        status:
          type: string
        priority:
          type: string
          enum: [low, medium, high, critical]
        jurisdiction:
          type: string
        deadline:
          type: string
        exposureAmount:
          type: number
        nextAction:
          type: string
      required: [title, matterType, linkedRecord, owner, status, priority, jurisdiction, deadline, exposureAmount, nextAction]
    FinanceRecord:
      type: object
      properties:
        id:
          type: string
        description:
          type: string
        category:
          type: string
        amount:
          type: number
        status:
          type: string
        owner:
          type: string
      required: [id, description, category, amount, status, owner]
    IntegrationStatus:
      type: object
      properties:
        id:
          type: string
        service:
          type: string
        domain:
          type: string
        status:
          type: string
          enum: [ready, configured, pending_credentials, degraded]
        pattern:
          type: string
        recoveryControl:
          type: string
      required: [id, service, domain, status, pattern, recoveryControl]
    ActivityItem:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
        actor:
          type: string
        action:
          type: string
        module:
          type: string
        impact:
          type: string
      required: [id, timestamp, actor, action, module, impact]
